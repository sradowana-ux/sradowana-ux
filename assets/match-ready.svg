<svg width="640" height="380" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252b31"/>
      <stop offset="100%" stop-color="#191f24"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111518"/>
      <stop offset="100%" stop-color="#171d22"/>
    </linearGradient>
    <linearGradient id="accept" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecb97"/>
      <stop offset="45%" stop-color="#2ba474"/>
      <stop offset="100%" stop-color="#1a7a54"/>
    </linearGradient>
    <linearGradient id="btnwell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061a12"/>
      <stop offset="100%" stop-color="#0a2419"/>
    </linearGradient>
    <linearGradient id="quality" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3325"/>
      <stop offset="100%" stop-color="#2c2820"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1d8a63" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1d8a63" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2ea87a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2ea87a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- full-bleed dark green background with ambient glows -->
  <rect width="640" height="380" fill="#04120d"/>
  <ellipse cx="120" cy="120" rx="380" ry="240" fill="url(#glowL)">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="560" cy="300" rx="330" ry="220" fill="url(#glowR)">
    <animate attributeName="opacity" values="1;0.7;1" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="330" cy="30" rx="260" ry="120" fill="url(#glowR)" opacity="0.6"/>

  <!-- modal -->
  <rect x="70" y="18" width="500" height="344" rx="4" fill="url(#modal)" stroke="#0d1013" stroke-width="2"/>
  <rect x="72" y="20" width="496" height="340" rx="3" fill="none" stroke="#3a424b" stroke-width="1" opacity="0.6"/>

  <!-- header -->
  <rect x="72" y="20" width="496" height="64" fill="url(#header)"/>
  <text x="320" y="46" font-family="Verdana, Geneva, sans-serif" font-size="13" letter-spacing="3"
        fill="#c8aa6e" text-anchor="middle">YOUR HIRE IS READY</text>
  <text x="320" y="72" font-family="Verdana, Geneva, sans-serif" font-size="19" font-weight="bold"
        letter-spacing="2" fill="#e6edf3" text-anchor="middle">ENTRY-LEVEL · DATA / ML</text>

  <!-- inset well behind the accept button -->
  <rect x="72" y="92" width="496" height="72" fill="url(#btnwell)"/>
  <line x1="72" y1="92" x2="568" y2="92" stroke="#000000" stroke-width="1" opacity="0.6"/>
  <line x1="72" y1="164" x2="568" y2="164" stroke="#3a424b" stroke-width="1" opacity="0.4"/>

  <!-- accept button: soft emerald glow behind -->
  <rect x="180" y="100" width="280" height="56" rx="3" fill="#3fc08e" filter="url(#soft)" opacity="0.55">
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="2.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="184" y="103" width="272" height="50" rx="3" fill="url(#accept)" stroke="#155c40" stroke-width="1.5"/>
  <rect x="186" y="105" width="268" height="22" rx="2" fill="#ffffff" opacity="0.16"/>
  <text x="320" y="136" font-family="Verdana, Geneva, sans-serif" font-size="19" font-weight="bold"
        letter-spacing="4" fill="#f2f8ec" text-anchor="middle">ACCEPT</text>

  <!-- match quality strip -->
  <rect x="100" y="178" width="440" height="30" fill="url(#quality)" rx="2"/>
  <text x="320" y="198" font-family="Verdana, Geneva, sans-serif" font-size="12" text-anchor="middle">
    <tspan fill="#b8b2a4">Overall match quality is: </tspan><tspan fill="#3fc08e" font-weight="bold">Excellent</tspan>
  </text>
  <text x="320" y="222" font-family="Verdana, Geneva, sans-serif" font-size="10.5" text-anchor="middle">
    <tspan fill="#8b949e">Skill Balance: </tspan><tspan fill="#c8aa6e">Perfect</tspan>
  </text>

  <!-- three columns -->
  <g font-family="Verdana, Geneva, sans-serif" text-anchor="middle">
    <line x1="247" y1="242" x2="247" y2="302" stroke="#3a424b" stroke-width="1"/>
    <line x1="393" y1="242" x2="393" y2="302" stroke="#3a424b" stroke-width="1"/>

    <text x="173" y="256" font-size="10" letter-spacing="2" fill="#c8aa6e">REGION</text>
    <text x="173" y="278" font-size="11" fill="#e6edf3">UK · Remote-ready</text>
    <text x="173" y="296" font-size="9.5" fill="#8b949e">Relocation: Open</text>

    <text x="320" y="256" font-size="10" letter-spacing="2" fill="#c8aa6e">SKILL RANGE</text>
    <text x="320" y="278" font-size="11" fill="#e6edf3">ML · RAG · BI · SQL</text>
    <text x="320" y="296" font-size="9.5" fill="#3fc08e">Trend: Climbing</text>

    <text x="467" y="256" font-size="10" letter-spacing="2" fill="#c8aa6e">BEHAVIOR</text>
    <text x="467" y="278" font-size="11" fill="#e6edf3">Ships projects: Yes</text>
    <text x="467" y="296" font-size="9.5" fill="#8b949e">Tests included: Always</text>
  </g>

  <!-- footer -->
  <line x1="100" y1="318" x2="540" y2="318" stroke="#3a424b" stroke-width="1"/>
  <text x="320" y="338" font-family="Verdana, Geneva, sans-serif" font-size="9.5" fill="#6a737d"
        text-anchor="middle">Declining this candidate may result in a low-priority hiring queue</text>
  <text x="320" y="354" font-family="Verdana, Geneva, sans-serif" font-size="9.5" fill="#c8aa6e"
        text-anchor="middle" letter-spacing="1">sradowana@gmail.com</text>
</svg>
