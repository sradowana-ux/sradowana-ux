<svg width="640" height="380" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262d34"/>
      <stop offset="100%" stop-color="#1a2026"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12161a"/>
      <stop offset="100%" stop-color="#181e23"/>
    </linearGradient>
    <linearGradient id="accept" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6f9138"/>
      <stop offset="50%" stop-color="#54742a"/>
      <stop offset="100%" stop-color="#3d5a1f"/>
    </linearGradient>
    <linearGradient id="quality" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3325"/>
      <stop offset="100%" stop-color="#2c2820"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ambient green glow behind modal -->
  <ellipse cx="320" cy="190" rx="330" ry="200" fill="#2e4419" opacity="0.15">
    <animate attributeName="opacity" values="0.10;0.20;0.10" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- modal -->
  <rect x="70" y="18" width="500" height="344" rx="4" fill="url(#modal)" stroke="#0d1013" stroke-width="2"/>
  <rect x="72" y="20" width="496" height="340" rx="3" fill="none" stroke="#3a424b" stroke-width="1" opacity="0.6"/>

  <!-- header -->
  <rect x="72" y="20" width="496" height="64" fill="url(#header)"/>
  <text x="320" y="46" font-family="Verdana, Geneva, sans-serif" font-size="13" letter-spacing="3"
        fill="#c8aa6e" text-anchor="middle">YOUR HIRE IS READY</text>
  <text x="320" y="72" font-family="Verdana, Geneva, sans-serif" font-size="19" font-weight="bold"
        letter-spacing="2" fill="#e6edf3" text-anchor="middle">ENTRY-LEVEL · DATA / ML</text>

  <!-- accept button -->
  <g filter="url(#glow)" opacity="0.8">
    <rect x="180" y="102" width="280" height="52" rx="3" fill="url(#accept)" stroke="#283e14" stroke-width="1.5">
      <animate attributeName="opacity" values="1;0.88;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="180" y="102" width="280" height="52" rx="3" fill="url(#accept)" stroke="#283e14" stroke-width="1.5"/>
  <rect x="182" y="104" width="276" height="22" rx="2" fill="#ffffff" opacity="0.07"/>
  <text x="320" y="135" font-family="Verdana, Geneva, sans-serif" font-size="19" font-weight="bold"
        letter-spacing="4" fill="#e4ecd7" text-anchor="middle">ACCEPT</text>

  <!-- match quality strip -->
  <rect x="100" y="172" width="440" height="30" fill="url(#quality)" rx="2"/>
  <text x="320" y="192" font-family="Verdana, Geneva, sans-serif" font-size="12" text-anchor="middle">
    <tspan fill="#b8b2a4">Overall match quality is: </tspan><tspan fill="#a3b45c" font-weight="bold">Excellent</tspan>
  </text>
  <text x="320" y="216" font-family="Verdana, Geneva, sans-serif" font-size="10.5" text-anchor="middle">
    <tspan fill="#8b949e">Skill Balance: </tspan><tspan fill="#c8aa6e">Perfect</tspan>
  </text>

  <!-- three columns -->
  <g font-family="Verdana, Geneva, sans-serif" text-anchor="middle">
    <line x1="247" y1="238" x2="247" y2="300" stroke="#3a424b" stroke-width="1"/>
    <line x1="393" y1="238" x2="393" y2="300" stroke="#3a424b" stroke-width="1"/>

    <text x="173" y="252" font-size="10" letter-spacing="2" fill="#c8aa6e">REGION</text>
    <text x="173" y="274" font-size="11" fill="#e6edf3">🌍 UK · Remote-ready</text>
    <text x="173" y="292" font-size="9.5" fill="#8b949e">Relocation: Open</text>

    <text x="320" y="252" font-size="10" letter-spacing="2" fill="#c8aa6e">SKILL RANGE</text>
    <text x="320" y="274" font-size="11" fill="#e6edf3">ML · RAG · BI · SQL</text>
    <text x="320" y="292" font-size="9.5" fill="#a3b45c">Trend: Climbing ▲</text>

    <text x="467" y="252" font-size="10" letter-spacing="2" fill="#c8aa6e">BEHAVIOR</text>
    <text x="467" y="274" font-size="11" fill="#e6edf3">Ships projects: Yes</text>
    <text x="467" y="292" font-size="9.5" fill="#8b949e">Tests included: Always</text>
  </g>

  <!-- footer -->
  <line x1="100" y1="314" x2="540" y2="314" stroke="#3a424b" stroke-width="1"/>
  <text x="320" y="336" font-family="Verdana, Geneva, sans-serif" font-size="9.5" fill="#6a737d"
        text-anchor="middle">Declining this candidate may result in a low-priority hiring queue</text>
  <text x="320" y="352" font-family="Verdana, Geneva, sans-serif" font-size="9.5" fill="#c8aa6e"
        text-anchor="middle" letter-spacing="1">✉ sradowana@gmail.com</text>
</svg>
