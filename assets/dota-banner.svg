<svg width="850" height="240" viewBox="0 0 850 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1319"/>
      <stop offset="100%" stop-color="#080b0f"/>
    </linearGradient>
    <radialGradient id="radiant" cx="0.15" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#4e7a2e" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#2f4d1d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0e1319" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dire" cx="0.85" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#8a2f2a" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#57201c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0e1319" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d9a8"/>
      <stop offset="45%" stop-color="#c8aa6e"/>
      <stop offset="100%" stop-color="#96793f"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1.6 0" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c8aa6e" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c8aa6e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c8aa6e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="850" height="240" fill="url(#bg)"/>
  <rect width="850" height="240" fill="url(#radiant)">
    <animate attributeName="opacity" values="0.75;1;0.75" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect width="850" height="240" fill="url(#dire)">
    <animate attributeName="opacity" values="1;0.7;1" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- corner ornaments -->
  <g stroke="#c8aa6e" stroke-width="1.4" fill="none" opacity="0.8">
    <path d="M14 30 L14 14 L30 14"/>
    <path d="M836 30 L836 14 L820 14"/>
    <path d="M14 210 L14 226 L30 226"/>
    <path d="M836 210 L836 226 L820 226"/>
  </g>
  <g fill="#c8aa6e" opacity="0.9">
    <rect x="11" y="11" width="6" height="6" transform="rotate(45 14 14)"/>
    <rect x="833" y="11" width="6" height="6" transform="rotate(45 836 14)"/>
    <rect x="11" y="223" width="6" height="6" transform="rotate(45 14 226)"/>
    <rect x="833" y="223" width="6" height="6" transform="rotate(45 836 226)"/>
  </g>

  <!-- top rule + diamond -->
  <rect x="175" y="52" width="500" height="1.5" fill="url(#rule)"/>
  <rect x="420.5" y="47.5" width="9" height="9" transform="rotate(45 425 52)" fill="#c8aa6e">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- faction tags -->
  <text x="120" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="15"
        letter-spacing="6" fill="#6f9a4a" text-anchor="middle" opacity="0.95">RADIANT</text>
  <text x="120" y="150" font-family="Georgia, serif" font-size="10" letter-spacing="2"
        fill="#54703d" text-anchor="middle">DATA · ANALYTICS</text>
  <text x="730" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="15"
        letter-spacing="6" fill="#b25049" text-anchor="middle" opacity="0.95">DIRE</text>
  <text x="730" y="150" font-family="Georgia, serif" font-size="10" letter-spacing="2"
        fill="#7d3b36" text-anchor="middle">DEEP · LEARNING</text>

  <!-- name -->
  <text x="425" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="46"
        font-weight="bold" letter-spacing="10" fill="url(#gold)" text-anchor="middle">RADOWANA</text>
  <text x="425" y="122" font-family="Georgia, 'Times New Roman', serif" font-size="46"
        font-weight="bold" letter-spacing="10" fill="url(#shine)" text-anchor="middle">RADOWANA</text>

  <!-- subtitle -->
  <text x="425" y="156" font-family="Georgia, serif" font-size="14" letter-spacing="4"
        fill="#9aa4ae" text-anchor="middle">AI ENGINEER · DATA ANALYST · ML STUDENT</text>

  <!-- bottom rule + diamond -->
  <rect x="175" y="186" width="500" height="1.5" fill="url(#rule)"/>
  <rect x="420.5" y="181.5" width="9" height="9" transform="rotate(45 425 186)" fill="#c8aa6e">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="425" y="215" font-family="Georgia, serif" font-size="11" letter-spacing="3"
        fill="#5c666f" text-anchor="middle">「 ALL LANES · ALL DATA · GG 」</text>
</svg>
